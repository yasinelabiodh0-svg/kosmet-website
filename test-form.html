<!DOCTYPE html>
<html>
<head>
    <title>Test Form - Kosmet</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, button { display: block; margin: 10px 0; padding: 10px; width: 300px; }
        button { background: #6B46C1; color: white; border: none; }
    </style>
</head>
<body>
    <h1>Test Form Submission</h1>
    
    <form id="testForm">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <button type="submit">Submit Test</button>
    </form>
    
    <div id="result"></div>
    
    <script>
    console.log('✅ Test script loaded');
    
    const form = document.getElementById('testForm');
    if (!form) {
        console.error('❌ Form not found');
    } else {
        console.log('✅ Form found');
        
        form.addEventListener('submit', async function(e) {
            console.log('✅ Submit event fired');
            e.preventDefault();
            e.stopPropagation();
            
            const btn = this.querySelector('button[type="submit"]');
            btn.textContent = 'Submitting...';
            btn.disabled = true;
            
            try {
                console.log('✅ Creating FormData');
                const formData = new FormData(this);
                const data = Object.fromEntries(formData.entries());
                
                console.log('✅ Data:', data);
                console.log('✅ Calling API...');
                
                // Test with simple fetch
                const response = await fetch('https://kosmet-website.vercel.app/api/submit-audit', {
                    method: 'POST',
                    body: JSON.stringify({
                        clinicName: 'Test Clinic',
                        email: data.email,
                        contactName: data.name,
                        contactRole: 'Owner',
                        city: 'Test',
                        state: 'CA',
                        yearsBusiness: '1-3',
                        numProviders: '1',
                        serviceRadius: '0-10',
                        monthlyPatients: '0-25',
                        services: ['Botox'],
                        marketing: ['SEO'],
                        agreeTerms: 'on'
                    }),
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('✅ Response status:', response.status);
                const result = await response.json();
                console.log('✅ Result:', result);
                
                document.getElementById('result').innerHTML = 
                    `<div style="background: #d4edda; padding: 10px; margin: 10px 0;">
                        <strong>Success!</strong> Submission ID: ${result.submissionId}
                    </div>`;
                
                if (result.success) {
                    setTimeout(() => {
                        window.location.href = 'https://kosmet.io/audit-thank-you.html';
                    }, 1000);
                }
                
            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('result').innerHTML = 
                    `<div style="background: #f8d7da; padding: 10px; margin: 10px 0;">
                        <strong>Error:</strong> ${error.message}
                    </div>`;
            } finally {
                btn.textContent = 'Submit Test';
                btn.disabled = false;
            }
        });
        
        console.log('✅ Event listener added');
    }
    </script>
</body>
</html>
